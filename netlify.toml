[build]
  command = "npm run build"
  publish = "dist"

# Edge Function: SEO prerender for crawlers on quiz/article pages
[[edge_functions]]
  function = "seo-prerender"
  path = "/quiz/*"

[[edge_functions]]
  function = "seo-prerender"
  path = "/article/*"

# SPA fallback — all routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# But serve actual files (sitemap, robots, etc.) directly
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"
