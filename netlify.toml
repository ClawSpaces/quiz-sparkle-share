[build]
  command = "npm run build"
  publish = "dist"

# Edge Function: SEO prerender for crawlers on quiz/article pages
[[edge_functions]]
  function = "seo-prerender"
  path = "/quiz/*"

[[edge_functions]]
  function = "seo-prerender"
  path = "/article/*"

[[edge_functions]]
  function = "seo-prerender"
  path = "/post/*"

[[edge_functions]]
  function = "seo-prerender"
  path = "/author/*"

[[edge_functions]]
  function = "seo-prerender"
  path = "/topic/*"

# SPA fallback — all routes go to index.html
# Static prerendered files (dist/quiz/*/index.html, dist/article/*/index.html)
# take priority over this rule because force is NOT set (default: false)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# But serve actual files (sitemap, robots, etc.) directly
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-news.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=1800"

[[headers]]
  for = "/feed.xml"
  [headers.values]
    Content-Type = "application/rss+xml; charset=utf-8"
    Cache-Control = "public, max-age=1800"
