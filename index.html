    <script type="module">
      import {onCLS, onINP, onLCP} from 'https://unpkg.com/web-vitals@4/dist/web-vitals.js?module';
      function sendToGA4({name, value, delta, id}) {
        if (typeof gtag === 'function') {
          gtag('event', name, { value: Math.round(name === 'CLS' ? delta * 1000 : delta), event_label: id, non_interaction: true });
        }
      }
      onCLS(sendToGA4); onINP(sendToGA4); onLCP(sendToGA4);
